name: Frontend CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # CI build validation should use root base path.
      VITE_BASE_PATH: /
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure GEMINI_API_KEY for live workflow validation
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY is required for live workflow validation on main."
            exit 1
          fi

      - name: Smoke test Gemini generation (live model, no JSON validation)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          node -e '
          const { GoogleGenAI } = require("@google/genai");

          (async () => {
            const apiKey = process.env.GEMINI_API_KEY;
            if (!apiKey) {
              throw new Error("GEMINI_API_KEY is missing.");
            }

            const ai = new GoogleGenAI({ apiKey });
            const prompt =
              process.env.WORKFLOW_VALIDATION_PROMPT ||
              "Create a short marketing automation summary in one sentence.";

            const response = await ai.models.generateContent({
              model: "gemini-3-flash-preview",
              contents: prompt,
            });

            const text = ((response && response.text) || "").trim();
            if (!text) {
              throw new Error("Gemini returned an empty response.");
            }

            console.log("[gemini-smoke] Success: received " + text.length + " characters.");
          })().catch((err) => {
            console.error(err && err.message ? err.message : err);
            process.exit(1);
          });
          '

      - name: Build frontend
        run: npm run build
